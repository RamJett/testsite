<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>~/console 2</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0a0a0a;
    font-family: "Courier New", Courier, monospace;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .terminal {
    width: 100%;
    max-width: 820px;
    background: #000;
    color: #00ff66;
    border: 1px solid #1f1f1f;
    border-radius: 6px;
    box-shadow: 0 0 40px rgba(0, 255, 102, 0.15);
    text-shadow: 0 0 4px rgba(0, 255, 102, 0.6);
    overflow: hidden;
  }
  .titlebar {
    background: #1a1a1a;
    color: #ccc;
    text-shadow: none;
    padding: 6px 12px;
    font-size: 13px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }
  .title { margin-left: 8px; opacity: 0.7; }
  .screen {
    padding: 18px 20px 22px;
    font-size: 15px;
    line-height: 1.4;
    white-space: pre;
    overflow-x: auto;
  }
  .prompt { color: #7CFC00; }
  .cursor {
    display: inline-block;
    width: 9px;
    height: 1em;
    background: #00ff66;
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title">rodney@testsite: ~</span>
    </div>
    <div class="screen"><span class="prompt">ramjett@testsite</span>:<span style="color:#5fafff">~</span>$ cowsay "Hello World"
 _____________
&lt; Hello World &gt;
 -------------
        \   ^__^
         \  (oo)\_______
            (__)\       )\/\
                ||----w |
                ||     ||

<span class="prompt">ramjett@testsite</span>:<span style="color:#5fafff">~</span>$ <span class="cursor"></span></div>
  </div>
</body>
</html>
