<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>~/console</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0a0a0a;
    font-family: "Courier New", Courier, monospace;
  }
  body {
    position: relative;
    box-sizing: border-box;
  }
  .terminal {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 800px;
    height: 500px;
    min-width: 320px;
    min-height: 200px;
    background: #000;
    color: #00ff66;
    border: 1px solid #1f1f1f;
    border-radius: 6px;
    box-shadow: 0 0 40px rgba(0, 255, 102, 0.15);
    text-shadow: 0 0 4px rgba(0, 255, 102, 0.6);
    overflow: hidden;
    resize: both;
    display: flex;
    flex-direction: column;
  }
  .titlebar {
    background: #1a1a1a;
    color: #ccc;
    text-shadow: none;
    padding: 6px 12px;
    font-size: 13px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: move;
    user-select: none;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }
  .title { margin-left: 8px; opacity: 0.7; }
  .screen {
    flex: 1;
    padding: 18px 20px 22px;
    font-size: 15px;
    line-height: 1.4;
    white-space: pre;
    overflow: auto;
  }
  .prompt { color: #7CFC00; }
  .cursor {
    display: inline-block;
    width: 9px;
    height: 1em;
    background: #00ff66;
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title">ramjett@testsite: ~</span>
    </div>
    <div class="screen"><span class="prompt">ramjett@testsite</span>:<span style="color:#5fafff">~</span>$ cowsay "Hello World"
 _____________
&lt; Hello World &gt;
 -------------
        \   ^__^
         \  (oo)\_______
            (__)\       )\/\
                ||----w |
                ||     ||

<span class="prompt">ramjett@testsite</span>:<span style="color:#5fafff">~</span>$ <span id="input"></span><span class="cursor"></span></div>
  </div>
<script>
  const terminal = document.querySelector('.terminal');
  const titlebar = document.querySelector('.titlebar');
  terminal.style.left = Math.max(0, (window.innerWidth - terminal.offsetWidth) / 2) + 'px';
  terminal.style.top = Math.max(0, (window.innerHeight - terminal.offsetHeight) / 2) + 'px';
  let dragging = false, ox = 0, oy = 0;
  titlebar.addEventListener('mousedown', e => {
    dragging = true;
    const rect = terminal.getBoundingClientRect();
    ox = e.clientX - rect.left;
    oy = e.clientY - rect.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    terminal.style.left = (e.clientX - ox) + 'px';
    terminal.style.top = (e.clientY - oy) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  const screen = document.querySelector('.screen');
  let inputEl = document.getElementById('input');
  let cursorEl = document.querySelector('.cursor');

  const PROMPT_HTML = '<span class="prompt">ramjett@testsite</span>:<span style="color:#5fafff">~</span>$ ';

  function cowsay(text) {
    const msg = (text || '').replace(/\t/g, '    ');
    const words = msg.split(/\s+/).filter(Boolean);
    const lines = [];
    let cur = '';
    for (const w of words) {
      if (!cur) cur = w;
      else if (cur.length + 1 + w.length <= 40) cur += ' ' + w;
      else { lines.push(cur); cur = w; }
    }
    if (cur) lines.push(cur);
    if (!lines.length) lines.push('');
    const width = Math.max(...lines.map(l => l.length));
    const top = ' ' + '_'.repeat(width + 2);
    const bot = ' ' + '-'.repeat(width + 2);
    let bubble;
    if (lines.length === 1) {
      bubble = top + '\n< ' + lines[0].padEnd(width) + ' >\n' + bot;
    } else {
      const mid = lines.map((l, i) => {
        const L = i === 0 ? '/' : (i === lines.length - 1 ? '\\' : '|');
        const R = i === 0 ? '\\' : (i === lines.length - 1 ? '/' : '|');
        return L + ' ' + l.padEnd(width) + ' ' + R;
      }).join('\n');
      bubble = top + '\n' + mid + '\n' + bot;
    }
    const cow = '        \\   ^__^\n         \\  (oo)\\_______\n            (__)\\       )\\/\\\n                ||----w |\n                ||     ||';
    return bubble + '\n' + cow;
  }

  function parseCmd(line) {
    const trimmed = line.trim();
    if (!trimmed) return ['', ''];
    const sp = trimmed.indexOf(' ');
    if (sp === -1) return [trimmed, ''];
    const name = trimmed.slice(0, sp);
    let rest = trimmed.slice(sp + 1).trim();
    if ((rest.startsWith('"') && rest.endsWith('"')) ||
        (rest.startsWith("'") && rest.endsWith("'"))) {
      rest = rest.slice(1, -1);
    }
    return [name, rest];
  }

  function execute(line) {
    const [name, arg] = parseCmd(line);
    if (!name) return '';
    if (name === 'cowsay') return cowsay(arg);
    if (name === 'clear') return '\x00CLEAR\x00';
    if (name === 'help') return 'available: cowsay <message>, clear, help';
    return name + ': command not found';
  }

  function newPromptLine() {
    screen.insertAdjacentHTML('beforeend', PROMPT_HTML);
    inputEl = document.createElement('span');
    inputEl.id = 'input';
    cursorEl = document.createElement('span');
    cursorEl.className = 'cursor';
    screen.append(inputEl, cursorEl);
  }

  function runCommand(cmd) {
    inputEl.replaceWith(document.createTextNode(inputEl.textContent));
    cursorEl.remove();
    const out = execute(cmd);
    if (out === '\x00CLEAR\x00') {
      screen.textContent = '';
    } else {
      screen.append(document.createTextNode('\n' + (out ? out + '\n' : '')));
    }
    newPromptLine();
    screen.scrollTop = screen.scrollHeight;
  }

  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key === 'Enter') {
      runCommand(inputEl.textContent);
      e.preventDefault();
    } else if (e.key === 'Backspace') {
      inputEl.textContent = inputEl.textContent.slice(0, -1);
      e.preventDefault();
    } else if (e.key.length === 1) {
      inputEl.textContent += e.key;
      e.preventDefault();
    }
  });
</script>
</body>
</html>
