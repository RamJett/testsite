<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>~/console</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0a0a0a;
    font-family: "Courier New", Courier, monospace;
  }
  body {
    position: relative;
    box-sizing: border-box;
  }
  .terminal {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 800px;
    height: 500px;
    min-width: 320px;
    min-height: 200px;
    background: #000;
    color: #00ff66;
    border: 1px solid #1f1f1f;
    border-radius: 6px;
    box-shadow: 0 0 40px rgba(0, 255, 102, 0.15);
    text-shadow: 0 0 4px rgba(0, 255, 102, 0.6);
    overflow: hidden;
    resize: both;
    display: flex;
    flex-direction: column;
  }
  .titlebar {
    background: #1a1a1a;
    color: #ccc;
    text-shadow: none;
    padding: 6px 12px;
    font-size: 13px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: move;
    user-select: none;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }
  .title { margin-left: 8px; opacity: 0.7; }
  .screen {
    flex: 1;
    padding: 18px 20px 22px;
    font-size: 15px;
    line-height: 1.4;
    white-space: pre;
    overflow: auto;
  }
  .prompt { color: #7CFC00; }
  .cursor {
    display: inline-block;
    width: 9px;
    height: 1em;
    background: #00ff66;
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title">ramjett@testsite: ~</span>
    </div>
    <div class="screen"><span class="prompt">ramjett@testsite</span>:<span style="color:#5fafff">~</span>$ cowsay "Hello World"
 _____________
&lt; Hello World &gt;
 -------------
        \   ^__^
         \  (oo)\_______
            (__)\       )\/\
                ||----w |
                ||     ||

<span class="prompt">ramjett@testsite</span>:<span style="color:#5fafff">~</span>$ <span class="cursor"></span></div>
  </div>
<script>
  const terminal = document.querySelector('.terminal');
  const titlebar = document.querySelector('.titlebar');
  terminal.style.left = Math.max(0, (window.innerWidth - terminal.offsetWidth) / 2) + 'px';
  terminal.style.top = Math.max(0, (window.innerHeight - terminal.offsetHeight) / 2) + 'px';
  let dragging = false, ox = 0, oy = 0;
  titlebar.addEventListener('mousedown', e => {
    dragging = true;
    const rect = terminal.getBoundingClientRect();
    ox = e.clientX - rect.left;
    oy = e.clientY - rect.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    terminal.style.left = (e.clientX - ox) + 'px';
    terminal.style.top = (e.clientY - oy) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
</script>
</body>
</html>
